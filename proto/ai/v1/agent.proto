syntax = "proto3";

package ai.v1;

option go_package = "github.com/Aparnap2/iterate_swarm/gen/go/ai/v1;aiv1";

// Agent service handles AI-powered analysis
service AgentService {
  rpc AnalyzeFeedback(AnalyzeFeedbackRequest) returns (AnalyzeFeedbackResponse);
  rpc StartSwarm(StartSwarmRequest) returns (StartSwarmResponse);
}

// SOPExecutor service handles SOP execution for BusinessOS
service SOPExecutor {
  rpc ExecuteSOP(ExecuteSOPRequest) returns (ExecuteSOPResponse);
}

message AnalyzeFeedbackRequest {
  string text = 1;
  string source = 2;  // e.g., "discord", "slack"
  string user_id = 3;
}

message AnalyzeFeedbackResponse {
  IssueSpec spec = 1;
  bool is_duplicate = 2;
  string reasoning = 3;  // Why the AI made this decision
}

// StartSwarmRequest initiates the multi-agent swarm for end-to-end feedback processing
message StartSwarmRequest {
  string task_id = 1;
  string feedback_text = 2;
  string source = 3;
  string user_id = 4;
  SwarmConfig config = 5;
}

// SwarmConfig controls which agents are enabled for the swarm
message SwarmConfig {
  bool enable_researcher = 1;
  bool enable_sre = 2;
  bool enable_swe = 3;
  bool enable_reviewer = 4;
}

// StartSwarmResponse contains the results from the multi-agent swarm execution
message StartSwarmResponse {
  string task_id = 1;
  SwarmStatus status = 2;
  repeated AgentResult results = 3;
  string pr_url = 4;  // If SWE agent created PR
  string error_message = 5;  // If status is FAILED
}

// SwarmStatus represents the overall execution status
enum SwarmStatus {
  SWARM_STATUS_UNSPECIFIED = 0;
  SWARM_STATUS_PENDING = 1;
  SWARM_STATUS_RUNNING = 2;
  SWARM_STATUS_COMPLETED = 3;
  SWARM_STATUS_FAILED = 4;
  SWARM_STATUS_INTERRUPTED = 5;  // HITL interrupt
}

// AgentResult contains the output from a single agent
message AgentResult {
  string agent_name = 1;
  bool success = 2;
  string output = 3;
  float confidence = 4;
  string error_message = 5;  // If success is false
}

message IssueSpec {
  string title = 1;
  Severity severity = 2;
  IssueType type = 3;
  string description = 4;
  repeated string labels = 5;
}

enum Severity {
  SEVERITY_UNSPECIFIED = 0;
  SEVERITY_LOW = 1;
  SEVERITY_MEDIUM = 2;
  SEVERITY_HIGH = 3;
  SEVERITY_CRITICAL = 4;
}

enum IssueType {
  ISSUE_TYPE_UNSPECIFIED = 0;
  ISSUE_TYPE_BUG = 1;
  ISSUE_TYPE_FEATURE = 2;
  ISSUE_TYPE_QUESTION = 3;
}

// =============================================================================
// SOP Executor Messages
// =============================================================================

// EventEnvelope is the ONLY shape that flows through Redpanda and Temporal.
// v1.0 schema: tenant-centric, agent-based routing
message EventEnvelope {
  // tenant_id is the multi-tenant identifier (replaces founder_id)
  string tenant_id = 1;
  
  // event_type is the normalized event type (replaces event_name)
  // e.g. PAYMENT_SUCCESS, USER_SIGNED_UP, EMPLOYEE_CREATED
  string event_type = 2;
  
  // source is the event source (razorpay, stripe, intercom, etc.)
  string source = 3;
  
  // payload_ref is a storage reference ("raw_events:<uuid>")
  // NEVER contains raw JSON — store in PostgreSQL first
  string payload_ref = 4;
  
  // payload_hash is the SHA-256 hash of raw payload
  string payload_hash = 5;
  
  // occurred_at is when the event occurred (from source)
  int64 occurred_at = 6;
  
  // received_at is when Sarthi received the event
  int64 received_at = 7;
  
  // trace_id is the distributed tracing ID (for Langfuse)
  string trace_id = 8;
  
  // idempotency_key is the deduplication key (e.g., "razorpay:pay_abc:v1")
  string idempotency_key = 9;
}

// ExecuteSOPRequest is the request for executing an SOP.
message ExecuteSOPRequest {
  EventEnvelope envelope = 1;
}

// ExecuteSOPResponse is the response from SOP execution.
message ExecuteSOPResponse {
  bool success = 1;
  string message = 2;
  bool fire_alert = 3;
}
