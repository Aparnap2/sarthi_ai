services:
  # ===========================================
  # Temporal - Workflow Orchestration
  # ===========================================
  temporal:
    image: temporalio/auto-setup:latest
    container_name: iterateswarm-temporal
    environment:
      - CASSANDRA_SEEDS=temporal
      - DYNAMIC_CONFIG_FILE_PATH=/etc/temporal/config/dynamicconfig/development.yaml
      - ENABLE_ES=false
      - LOG_LEVEL=info
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-iterateswarm}
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-iterateswarm}
      - POSTGRES_SEEDS=postgres
      - TEMPORAL_UI_PORT=8080
      - BIND_ON_IP=0.0.0.0
    ports:
      - "7233:7233"   # gRPC API
      - "8088:8080"   # Temporal UI
    volumes:
      - ./config/temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iterateswarm-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  temporal-admin-tools:
    image: temporalio/admin-tools:latest
    container_name: iterateswarm-temporal-admin
    depends_on:
      - temporal
    networks:
      - iterateswarm-net
    entrypoint: ["sleep", "infinity"]

  # ===========================================
  # Redpanda - Kafka-compatible event streaming
  # ===========================================
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.1
    container_name: iterateswarm-redpanda
    command:
      - redpanda
      - start
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092,EXTERNAL://localhost:9094
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=redpanda:8082
      - --schema-registry-addr=0.0.0.0:8081
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
      - --overprovisioned
      - --unsafe-bypass-fsync=true
    ports:
      - "19092:9092"  # Kafka API (internal)
      - "9094:9094"   # Kafka API (external - for local dev)
      - "8081:8081"   # Schema Registry
      - "8082:8082"   # REST Proxy
      - "33145:33145" # RPC
      - "9644:9644"   # Admin API
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    networks:
      - iterateswarm-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9644/v1/status/ready"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ===========================================
  # PostgreSQL - Database
  # ===========================================
  postgres:
    image: postgres:15-alpine
    container_name: iterateswarm-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-iterateswarm}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-iterateswarm}
      - POSTGRES_DB=${POSTGRES_DB:-iterateswarm}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - iterateswarm-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iterateswarm -d iterateswarm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Qdrant - Vector Database
  # ===========================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: iterateswarm-qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant-data:/var/lib/qdrant
    networks:
      - iterateswarm-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/collections"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ===========================================
  # Prometheus - Metrics Collection
  # ===========================================
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: iterateswarm-prometheus
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    networks:
      - iterateswarm-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ===========================================
  # Grafana - Metrics Dashboard
  # ===========================================
  grafana:
    image: grafana/grafana:11.0.0
    container_name: iterateswarm-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - iterateswarm-net
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ===========================================
  # Temporal UI - Workflow Dashboard
  # ===========================================
  temporal-ui:
    image: temporalio/ui:latest
    container_name: iterateswarm-temporal-ui
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8088
    ports:
      - "8089:8080"
    networks:
      - iterateswarm-net
    depends_on:
      - temporal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ===========================================
  # Redpanda Consumer - Workflow Trigger
  # ===========================================
  consumer:
    image: golang:1.24-alpine
    container_name: iterateswarm-consumer
    working_dir: /app
    volumes:
      - ./apps/core:/app
      - ./gen/go:/gen/go:ro
    environment:
      - KAFKA_BROKERS=redpanda:9092
      - TEMPORAL_ADDRESS=temporal:7233
      - GITHUB_OWNER=${GITHUB_OWNER}
      - GITHUB_REPO=${GITHUB_REPO}
    depends_on:
      - redpanda
      - temporal
    networks:
      - iterateswarm-net
    command: go run cmd/consumer/main.go

  # ===========================================
  # Go Worker - Activity Processor
  # ===========================================
  worker:
    image: golang:1.24-alpine
    container_name: iterateswarm-worker
    working_dir: /app
    volumes:
      - ./apps/core:/app
      - ./gen/go:/gen/go:ro
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_OWNER=${GITHUB_OWNER}
      - GITHUB_REPO=${GITHUB_REPO}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - TEST_MODE=${TEST_MODE:-true}
      - DEV_MODE=${DEV_MODE:-true}
    depends_on:
      - temporal
    networks:
      - iterateswarm-net
    command: go run cmd/worker/main.go -temporal=temporal:7233 -queue=GO_TASK_QUEUE

  # ===========================================
  # SwarmChat - Discord Replacement
  # ===========================================
  swarm-chat:
    build:
      context: ./apps/swarm-chat
      dockerfile: Dockerfile
    container_name: iterateswarm-swarm-chat
    ports:
      - "4000:4000"
    environment:
      - POSTGRES_URL=postgres://iterateswarm:iterateswarm@postgres:5432/iterateswarm?sslmode=disable
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
    networks:
      - iterateswarm-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # SwarmRepo - GitHub Replacement
  # ===========================================
  swarm-repo:
    build:
      context: ./apps/swarm-repo
      dockerfile: Dockerfile
    container_name: iterateswarm-swarm-repo
    ports:
      - "4001:4001"
    environment:
      - POSTGRES_URL=postgres://iterateswarm:iterateswarm@postgres:5432/iterateswarm?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iterateswarm-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redpanda-data:
    driver: local
  postgres-data:
    driver: local
  qdrant-data:
    driver: local
  pgadmin-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  iterateswarm-net:
    driver: bridge
