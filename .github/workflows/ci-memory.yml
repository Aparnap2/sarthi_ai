# .github/workflows/ci-memory.yml
# Memory spine tests — tenant isolation, decay, schema migration
# Uses real Qdrant service container

name: Memory Spine Tests

on:
  push:
    paths:
      - "apps/ai/src/memory/**"
      - "apps/ai/scripts/memory_decay_job.py"
      - "apps/ai/scripts/migrate_memory_schema.py"
  pull_request:
    paths:
      - "apps/ai/src/memory/**"

jobs:
  memory-tests:
    name: Memory Spine (Qdrant + Tenant Isolation)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl -sf http://localhost:6333/healthz || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: apps/ai
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Wait for Qdrant
        run: |
          echo "Waiting for Qdrant REST API..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:6333/healthz; then
              echo "Qdrant ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Create test collections
        working-directory: apps/ai
        env:
          QDRANT_URL: "http://localhost:6333"
        run: python scripts/create_collections.py

      - name: Run tenant isolation test
        working-directory: apps/ai
        env:
          QDRANT_URL: "http://localhost:6333"
        run: |
          python - <<'EOF'
          import os, sys
          os.environ["QDRANT_URL"] = "http://localhost:6333"

          from src.memory.qdrant_ops import upsert_memory, search_memory

          # Write tenant-A data
          upsert_memory(
              tenant_id   = "ci-tenant-A",
              content     = "MRR dropped 20 percent critical anomaly do not leak",
              memory_type = "anomaly",
              agent       = "AnomalyAgent"
          )

          # Tenant-B must see zero results
          results = search_memory(
              tenant_id = "ci-tenant-B",
              query     = "MRR dropped critical anomaly"
          )

          if len(results) > 0:
              print(f"ISOLATION BREACH: tenant-B sees {len(results)} tenant-A vectors", file=sys.stderr)
              for r in results:
                  print(f"  Leaked: {r}", file=sys.stderr)
              sys.exit(1)

          print("OK: Tenant isolation verified — cross-tenant leakage blocked")
          EOF

      - name: Run memory decay test
        working-directory: apps/ai
        env:
          QDRANT_URL: "http://localhost:6333"
        run: |
          python - <<'EOF'
          import os, sys
          os.environ["QDRANT_URL"] = "http://localhost:6333"

          from src.memory.qdrant_ops import upsert_memory
          from scripts.memory_decay_job import decay_memory_weights
          from src.memory.qdrant_client import get_qdrant_client

          point_id = upsert_memory(
              tenant_id   = "ci-decay-test",
              content     = "decay test vector",
              memory_type = "anomaly",
              agent       = "AnomalyAgent"
          )

          decay_memory_weights()

          qd = get_qdrant_client()
          result = qd.retrieve("agent_memory", ids=[point_id], with_payload=True)

          if not result:
              print("FAIL: Vector not found after decay", file=sys.stderr)
              sys.exit(1)

          weight = result[0].payload.get("relevance_weight")
          expected = round(1.0 * 0.85, 4)

          if abs(weight - expected) > 0.001:
              print(f"FAIL: Expected weight {expected}, got {weight}", file=sys.stderr)
              sys.exit(1)

          print(f"OK: Decay verified — weight: 1.0 → {weight}")
          EOF

      - name: Run full memory test suite
        working-directory: apps/ai
        env:
          QDRANT_URL: "http://localhost:6333"
        run: |
          pytest tests/integration/test_memory*.py \
            -v \
            --tb=short \
            --timeout=30 \
            --junitxml=reports/memory-results.xml

      - name: Upload memory test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: memory-test-results
          path: apps/ai/reports/memory-results.xml
          retention-days: 7
