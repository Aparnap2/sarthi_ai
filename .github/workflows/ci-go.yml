# .github/workflows/ci-go.yml
# Go API gateway tests — webhook handlers, gRPC bridge, health checks

name: Go Gateway Tests

on:
  push:
    paths:
      - "apps/core/**"
      - "apps/gateway/**"
  pull_request:
    paths:
      - "apps/core/**"
      - "apps/gateway/**"

jobs:
  go-tests:
    name: Go Gateway (Unit + Integration)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run Go unit tests
        working-directory: apps/core
        run: |
          go test ./... \
            -v \
            -count=1 \
            -timeout 60s \
            -coverprofile=coverage.out

      - name: Check coverage threshold
        working-directory: apps/core
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 60" | bc -l) )); then
            echo "FAIL: Go coverage ${COVERAGE}% is below 60% threshold"
            exit 1
          fi

      - name: Run go vet
        working-directory: apps/core
        run: go vet ./...

      - name: Run staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "2024.1"
          working-directory: apps/core
