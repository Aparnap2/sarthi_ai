# .github/workflows/ci-integration.yml
# Integration tests — spins up real Qdrant, Postgres, Redis, Redpanda
# Uses official service containers from GitHub Actions docs
# Refs:
#   Qdrant:   https://qdrant.tech/documentation/frameworks/testcontainers/
#   Redpanda: https://github.com/marketplace/actions/redpanda-action (v0.1.4)
#   Postgres: https://docs.github.com/en/actions/use-cases-and-examples/using-containerized-services/creating-postgresql-service-containers
#   Redis:    https://docs.github.com/en/actions/use-cases-and-examples/using-containerized-services/creating-redis-service-containers

name: Integration Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 2 * * *"   # nightly at 2am UTC

jobs:
  integration-tests:
    name: Integration Tests (Real Services)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # ── Service containers ──────────────────────────────────────────────────
    # GitHub Actions docs: services run as Docker containers on the same
    # Docker network as the job. Access them via localhost + mapped port.
    services:

      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     sarthi
          POSTGRES_PASSWORD: sarthi_test
          POSTGRES_DB:       sarthi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sarthi -d sarthi_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      qdrant:
        # Official Qdrant Docker image — no auth needed for CI
        # Health endpoint: GET /healthz (returns 200 when ready)
        # Ref: https://qdrant.tech/documentation/guides/installation/
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333   # REST API
          - 6334:6334   # gRPC
        options: >-
          --health-cmd "curl -sf http://localhost:6333/healthz || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Redpanda ──────────────────────────────────────────────────────────
      # Official Redpanda GitHub Action
      # Ref: https://github.com/marketplace/actions/redpanda-action
      # Connects at localhost:9092 (Kafka-compatible API)
      - name: Start Redpanda
        uses: redpanda-data/github-action@v0.1.4
        with:
          version: "latest"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: apps/ai
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run database migrations
        working-directory: apps/ai
        env:
          POSTGRES_DSN: "postgresql://sarthi:sarthi_test@localhost:5432/sarthi_test"
        run: |
          python -m alembic upgrade head

      - name: Create Qdrant collections
        working-directory: apps/ai
        env:
          QDRANT_URL: "http://localhost:6333"
        run: |
          python scripts/create_collections.py

      - name: Wait for all services
        run: |
          echo "Waiting for Postgres..."
          until pg_isready -h localhost -p 5432 -U sarthi; do sleep 1; done

          echo "Waiting for Redis..."
          until redis-cli -h localhost ping | grep -q PONG; do sleep 1; done

          echo "Waiting for Qdrant..."
          until curl -sf http://localhost:6333/healthz; do sleep 1; done

          echo "Waiting for Redpanda..."
          until rpk cluster health --brokers localhost:9092 2>/dev/null | grep -q healthy; do
            sleep 1
          done || true   # rpk may not be installed — Redpanda action handles startup

          echo "All services ready."

      - name: Run integration tests
        working-directory: apps/ai
        env:
          POSTGRES_DSN:    "postgresql://sarthi:sarthi_test@localhost:5432/sarthi_test"
          REDIS_URL:       "redis://localhost:6379"
          QDRANT_URL:      "http://localhost:6333"
          REDPANDA_BROKERS: "localhost:9092"
          DEMO_MODE:       "true"
          LLM_PROVIDER:    "mock"   # no real LLM in CI — use deterministic mock
        run: |
          pytest tests/integration/ \
            -v \
            --tb=short \
            --timeout=60 \
            -n 2 \
            --junitxml=reports/integration-results.xml

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: apps/ai/reports/
          retention-days: 7
