name: CI - Unit Tests & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install dependencies
        working-directory: ./apps/ai
        run: uv sync --dev
      
      - name: Run ruff lint
        working-directory: ./apps/ai
        run: uv run ruff check src tests
      
      - name: Run mypy
        working-directory: ./apps/ai
        run: uv run mypy src --strict --ignore-missing-imports

  python-tests:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sarthi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install dependencies
        working-directory: ./apps/ai
        run: uv sync --dev
      
      - name: Run unit tests (no LLM)
        working-directory: ./apps/ai
        run: |
          uv run pytest tests/ \
            -v \
            --ignore=tests/test_e2e_internal_ops.py \
            --ignore=tests/test_llm_connectivity.py \
            -m "not skipif" \
            --tb=short \
            --timeout=60
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/ai/coverage.xml
          flags: python

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      
      - name: Install dependencies
        working-directory: ./apps/core
        run: go mod download
      
      - name: Run gofmt
        working-directory: ./apps/core
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "Files not formatted with gofmt:"
            echo "$diff"
            exit 1
          fi
      
      - name: Run go vet
        working-directory: ./apps/core
        run: go vet ./...

  go-tests:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    services:
      temporal:
        image: temporalio/auto-setup:latest
        ports:
          - 7233:7233
        env:
          DB: postgresql
          DB_PORT: 5432
          POSTGRES_USER: temporal
          POSTGRES_PWD: temporal
          POSTGRES_SEEDS: postgres
        options: >-
          --health-cmd "temporal status"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      
      - name: Install dependencies
        working-directory: ./apps/core
        run: go mod download
      
      - name: Run Go tests
        working-directory: ./apps/core
        run: |
          go test ./... \
            -v \
            -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -timeout=5m \
            -skip=TestFeedbackWorkflow_ConcurrentWorkflows
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/core/coverage.out
          flags: go

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [python-tests, go-tests]
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Build Python
        working-directory: ./apps/ai
        run: uv build
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      
      - name: Build Go
        working-directory: ./apps/core
        run: |
          mkdir -p bin
          go build -o bin/worker ./cmd/worker
          go build -o bin/server ./cmd/server
