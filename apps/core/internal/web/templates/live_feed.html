<!-- Live Feed Panel - SSE Streaming -->
<div class="card bg-white rounded-xl shadow-md overflow-hidden" hx-ext="sse" sse-connect="/api/stream/events" sse-swap="message">
    <div class="card-header bg-gradient-to-r from-purple-600 to-indigo-600 px-6 py-4">
        <div class="flex items-center justify-between">
            <h3 class="text-lg font-semibold text-white">
                <i class="fas fa-satellite-dish mr-2"></i>📡 Live Agent Feed
            </h3>
            <span class="px-3 py-1 bg-white/20 text-white rounded-full text-xs font-semibold flex items-center">
                <span class="w-2 h-2 bg-green-400 rounded-full mr-2 animate-pulse"></span>
                Live
            </span>
        </div>
    </div>
    <div class="card-content p-6" id="event-stream">
        <!-- SSE events append here -->
        <div id="events-container" class="space-y-3 max-h-96 overflow-y-auto">
            <div class="text-center text-gray-500 py-8" id="no-events">
                <i class="fas fa-broadcast-tower text-4xl mb-2 text-gray-300"></i>
                <p class="text-sm">Waiting for agent events...</p>
            </div>
        </div>
        
        <!-- Event Template (hidden, used by JS) -->
        <template id="event-template">
            <div class="event-item bg-gray-50 border-l-4 rounded-lg p-4 animate-fade-in">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-3">
                        <span class="agent-badge px-2 py-1 rounded text-xs font-semibold"></span>
                        <span class="timestamp text-xs text-gray-500"></span>
                    </div>
                    <span class="event-type px-2 py-1 rounded text-xs font-medium"></span>
                </div>
                <div class="mt-2 text-sm text-gray-700">
                    <span class="task-id font-mono bg-gray-200 px-2 py-0.5 rounded"></span>
                </div>
            </div>
        </template>
    </div>
</div>

<script>
// Agent color mapping
const agentColors = {
    'supervisor': 'bg-purple-100 text-purple-800 border-purple-500',
    'researcher': 'bg-blue-100 text-blue-800 border-blue-500',
    'sre': 'bg-red-100 text-red-800 border-red-500',
    'swe': 'bg-green-100 text-green-800 border-green-500',
    'reviewer': 'bg-yellow-100 text-yellow-800 border-yellow-500'
};

const agentIcons = {
    'supervisor': '🎯',
    'researcher': '🔍',
    'sre': '⚙️',
    'swe': '💻',
    'reviewer': '✅'
};

const typeColors = {
    'planning': 'bg-indigo-100 text-indigo-800',
    'executing': 'bg-blue-100 text-blue-800',
    'reviewing': 'bg-yellow-100 text-yellow-800',
    'completing': 'bg-green-100 text-green-800',
    'error': 'bg-red-100 text-red-800'
};

// Handle SSE events
document.addEventListener('DOMContentLoaded', function() {
    const container = document.getElementById('events-container');
    const noEvents = document.getElementById('no-events');
    const template = document.getElementById('event-template');
    
    // Listen for SSE messages
    document.addEventListener('message', function(event) {
        try {
            const data = JSON.parse(event.data);
            
            // Hide "no events" message
            if (noEvents) noEvents.style.display = 'none';
            
            // Create event element from template
            const clone = template.content.cloneNode(true);
            const eventItem = clone.querySelector('.event-item');
            
            // Set agent badge
            const badge = eventItem.querySelector('.agent-badge');
            const agent = data.agent || 'unknown';
            badge.textContent = `${agentIcons[agent] || '🤖'} ${agent}`;
            badge.className = `agent-badge px-3 py-1 rounded text-xs font-semibold ${agentColors[agent] || 'bg-gray-100 text-gray-800'}`;
            
            // Set timestamp
            const timestamp = eventItem.querySelector('.timestamp');
            const time = data.timestamp ? new Date(data.timestamp).toLocaleTimeString() : new Date().toLocaleTimeString();
            timestamp.textContent = time;
            
            // Set event type
            const typeEl = eventItem.querySelector('.event-type');
            const eventType = data.type || 'unknown';
            typeEl.textContent = eventType;
            typeEl.className = `event-type px-3 py-1 rounded text-xs font-medium ${typeColors[eventType] || 'bg-gray-100 text-gray-800'}`;
            
            // Set task ID
            const taskIdEl = eventItem.querySelector('.task-id');
            taskIdEl.textContent = data.task_id ? `Task: ${data.task_id}` : 'No task ID';
            
            // Add data attribute for filtering
            eventItem.dataset.agent = agent;
            eventItem.dataset.type = eventType;
            
            // Add to container (prepend for newest first)
            container.insertBefore(eventItem, container.firstChild);
            
            // Limit to last 50 events
            while (container.children.length > 50) {
                container.removeChild(container.lastChild);
            }
            
            // Auto-scroll to top
            container.scrollTop = 0;
            
        } catch (e) {
            console.error('Error parsing SSE event:', e);
        }
    });
    
    // Handle SSE connection errors
    document.addEventListener('htmx:sseError', function(event) {
        console.error('SSE Error:', event.detail.error);
        if (noEvents) {
            noEvents.innerHTML = `
                <i class="fas fa-exclamation-triangle text-4xl mb-2 text-yellow-500"></i>
                <p class="text-sm text-yellow-600">Connection lost. Reconnecting...</p>
            `;
        }
    });
    
    // Handle SSE reconnection
    document.addEventListener('htmx:sseReconnect', function() {
        if (noEvents) {
            noEvents.innerHTML = `
                <i class="fas fa-sync text-4xl mb-2 text-blue-500 fa-spin"></i>
                <p class="text-sm text-blue-600">Reconnecting...</p>
            `;
        }
    });
});
</script>

<style>
@keyframes fade-in {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}
.animate-fade-in {
    animation: fade-in 0.3s ease-out;
}
</style>
