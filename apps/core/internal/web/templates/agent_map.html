<!-- Agent Map Panel - SVG Topology Visualization -->
<div class="card bg-white rounded-xl shadow-md overflow-hidden">
    <div class="card-header bg-gradient-to-r from-cyan-600 to-blue-600 px-6 py-4">
        <div class="flex items-center justify-between">
            <h3 class="text-lg font-semibold text-white">
                <i class="fas fa-project-diagram mr-2"></i>🗺️ Agent Topology
            </h3>
            <button hx-get="/api/agents/status"
                    hx-trigger="every 10s"
                    hx-target="#agent-map-content"
                    class="text-white/80 hover:text-white text-sm flex items-center">
                <i class="fas fa-sync-alt mr-1"></i>Refresh
            </button>
        </div>
    </div>
    <div class="card-content p-6" id="agent-map-content">
        <svg viewBox="0 0 800 400" class="w-full h-auto" id="agent-topology">
            <!-- Definitions for gradients and filters -->
            <defs>
                <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                <linearGradient id="supervisorGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:1" />
                </linearGradient>
                <linearGradient id="researcherGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
                </linearGradient>
                <linearGradient id="sreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#B91C1C;stop-opacity:1" />
                </linearGradient>
                <linearGradient id="sweGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
                </linearGradient>
                <linearGradient id="reviewerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#B45309;stop-opacity:1" />
                </linearGradient>
            </defs>
            
            <!-- Connection lines -->
            <g class="connections" stroke="#CBD5E1" stroke-width="2" fill="none">
                <!-- Supervisor to all agents -->
                <line x1="400" y1="200" x2="200" y2="100" class="connection-line" data-from="supervisor" data-to="researcher"/>
                <line x1="400" y1="200" x2="600" y2="100" class="connection-line" data-from="supervisor" data-to="sre"/>
                <line x1="400" y1="200" x2="200" y2="300" class="connection-line" data-from="supervisor" data-to="swe"/>
                <line x1="400" y1="200" x2="600" y2="300" class="connection-line" data-from="supervisor" data-to="reviewer"/>
            </g>
            
            <!-- Agent Nodes -->
            <g class="agent-nodes">
                <!-- Supervisor (Center) -->
                <g class="agent-node supervisor" data-agent="supervisor" 
                   transform="translate(400, 200)"
                   hx-get="/api/agents/supervisor/status"
                   hx-trigger="every 10s"
                   style="cursor: pointer;">
                    <circle r="55" fill="url(#supervisorGradient)" filter="url(#glow)" class="agent-circle"/>
                    <circle r="50" fill="none" stroke="#A78BFA" stroke-width="2" stroke-dasharray="5,5" class="pulse-ring"/>
                    <text x="0" y="-10" text-anchor="middle" fill="white" font-size="24" font-weight="bold">🎯</text>
                    <text x="0" y="15" text-anchor="middle" fill="white" font-size="12" font-weight="600">Supervisor</text>
                    <text x="0" y="30" text-anchor="middle" fill="#C4B5FD" font-size="10" class="agent-status">Active</text>
                </g>
                
                <!-- Researcher (Top Left) -->
                <g class="agent-node researcher" data-agent="researcher"
                   transform="translate(200, 100)"
                   hx-get="/api/agents/researcher/status"
                   hx-trigger="every 10s"
                   style="cursor: pointer;">
                    <circle r="45" fill="url(#researcherGradient)" filter="url(#glow)" class="agent-circle"/>
                    <text x="0" y="-5" text-anchor="middle" fill="white" font-size="20" font-weight="bold">🔍</text>
                    <text x="0" y="20" text-anchor="middle" fill="white" font-size="11" font-weight="600">Researcher</text>
                    <text x="0" y="35" text-anchor="middle" fill="#BFDBFE" font-size="10" class="agent-status">Idle</text>
                </g>
                
                <!-- SRE (Top Right) -->
                <g class="agent-node sre" data-agent="sre"
                   transform="translate(600, 100)"
                   hx-get="/api/agents/sre/status"
                   hx-trigger="every 10s"
                   style="cursor: pointer;">
                    <circle r="45" fill="url(#sreGradient)" filter="url(#glow)" class="agent-circle"/>
                    <text x="0" y="-5" text-anchor="middle" fill="white" font-size="20" font-weight="bold">⚙️</text>
                    <text x="0" y="20" text-anchor="middle" fill="white" font-size="11" font-weight="600">SRE</text>
                    <text x="0" y="35" text-anchor="middle" fill="#FCA5A5" font-size="10" class="agent-status">Idle</text>
                </g>
                
                <!-- SWE (Bottom Left) -->
                <g class="agent-node swe" data-agent="swe"
                   transform="translate(200, 300)"
                   hx-get="/api/agents/swe/status"
                   hx-trigger="every 10s"
                   style="cursor: pointer;">
                    <circle r="45" fill="url(#sweGradient)" filter="url(#glow)" class="agent-circle"/>
                    <text x="0" y="-5" text-anchor="middle" fill="white" font-size="20" font-weight="bold">💻</text>
                    <text x="0" y="20" text-anchor="middle" fill="white" font-size="11" font-weight="600">SWE</text>
                    <text x="0" y="35" text-anchor="middle" fill="#A7F3D0" font-size="10" class="agent-status">Idle</text>
                </g>
                
                <!-- Reviewer (Bottom Right) -->
                <g class="agent-node reviewer" data-agent="reviewer"
                   transform="translate(600, 300)"
                   hx-get="/api/agents/reviewer/status"
                   hx-trigger="every 10s"
                   style="cursor: pointer;">
                    <circle r="45" fill="url(#reviewerGradient)" filter="url(#glow)" class="agent-circle"/>
                    <text x="0" y="-5" text-anchor="middle" fill="white" font-size="20" font-weight="bold">✅</text>
                    <text x="0" y="20" text-anchor="middle" fill="white" font-size="11" font-weight="600">Reviewer</text>
                    <text x="0" y="35" text-anchor="middle" fill="#FDE68A" font-size="10" class="agent-status">Idle</text>
                </g>
            </g>
            
            <!-- Activity indicators (animated dots on connections) -->
            <g class="activity-indicators">
                <circle r="4" fill="#8B5CF6" class="activity-dot">
                    <animateMotion dur="3s" repeatCount="indefinite" path="M400,200 L200,100"/>
                </circle>
                <circle r="4" fill="#EF4444" class="activity-dot">
                    <animateMotion dur="4s" repeatCount="indefinite" path="M400,200 L600,100"/>
                </circle>
                <circle r="4" fill="#10B981" class="activity-dot">
                    <animateMotion dur="3.5s" repeatCount="indefinite" path="M400,200 L200,300"/>
                </circle>
                <circle r="4" fill="#F59E0B" class="activity-dot">
                    <animateMotion dur="4.5s" repeatCount="indefinite" path="M400,200 L600,300"/>
                </circle>
            </g>
        </svg>
        
        <!-- Legend -->
        <div class="mt-4 flex flex-wrap justify-center gap-4">
            <div class="flex items-center space-x-2">
                <span class="w-3 h-3 rounded-full bg-purple-500"></span>
                <span class="text-sm text-gray-600">Supervisor</span>
            </div>
            <div class="flex items-center space-x-2">
                <span class="w-3 h-3 rounded-full bg-blue-500"></span>
                <span class="text-sm text-gray-600">Researcher</span>
            </div>
            <div class="flex items-center space-x-2">
                <span class="w-3 h-3 rounded-full bg-red-500"></span>
                <span class="text-sm text-gray-600">SRE</span>
            </div>
            <div class="flex items-center space-x-2">
                <span class="w-3 h-3 rounded-full bg-green-500"></span>
                <span class="text-sm text-gray-600">SWE</span>
            </div>
            <div class="flex items-center space-x-2">
                <span class="w-3 h-3 rounded-full bg-amber-500"></span>
                <span class="text-sm text-gray-600">Reviewer</span>
            </div>
        </div>
        
        <!-- Status Summary -->
        <div class="mt-4 grid grid-cols-5 gap-2 text-center">
            <div class="bg-purple-50 rounded-lg p-2">
                <div class="text-xs text-purple-600 font-medium">Supervisor</div>
                <div class="text-lg font-bold text-purple-800" id="supervisor-tasks">0</div>
                <div class="text-xs text-purple-500">tasks</div>
            </div>
            <div class="bg-blue-50 rounded-lg p-2">
                <div class="text-xs text-blue-600 font-medium">Researcher</div>
                <div class="text-lg font-bold text-blue-800" id="researcher-tasks">0</div>
                <div class="text-xs text-blue-500">tasks</div>
            </div>
            <div class="bg-red-50 rounded-lg p-2">
                <div class="text-xs text-red-600 font-medium">SRE</div>
                <div class="text-lg font-bold text-red-800" id="sre-tasks">0</div>
                <div class="text-xs text-red-500">tasks</div>
            </div>
            <div class="bg-green-50 rounded-lg p-2">
                <div class="text-xs text-green-600 font-medium">SWE</div>
                <div class="text-lg font-bold text-green-800" id="swe-tasks">0</div>
                <div class="text-xs text-green-500">tasks</div>
            </div>
            <div class="bg-amber-50 rounded-lg p-2">
                <div class="text-xs text-amber-600 font-medium">Reviewer</div>
                <div class="text-lg font-bold text-amber-800" id="reviewer-tasks">0</div>
                <div class="text-xs text-amber-500">tasks</div>
            </div>
        </div>
    </div>
</div>

<script>
// Agent status colors
const statusColors = {
    'active': 'text-green-400',
    'busy': 'text-yellow-400',
    'idle': 'text-gray-400',
    'error': 'text-red-400'
};

// Update agent status from API response
function updateAgentStatus(agent, status) {
    const node = document.querySelector(`.agent-node.${agent}`);
    if (!node) return;
    
    const statusText = node.querySelector('.agent-status');
    if (statusText) {
        statusText.textContent = status.state || 'Unknown';
        statusText.className = `agent-status ${statusColors[status.state] || 'text-gray-400'}`;
    }
    
    // Update task count
    const taskCount = document.getElementById(`${agent}-tasks`);
    if (taskCount && status.task_count !== undefined) {
        taskCount.textContent = status.task_count;
    }
    
    // Visual feedback for active state
    const circle = node.querySelector('.agent-circle');
    if (status.state === 'active' || status.state === 'busy') {
        circle.style.filter = 'url(#glow)';
    } else {
        circle.style.filter = 'none';
    }
}

// Handle click on agent node
function showAgentDetails(agent) {
    htmx.ajax('GET', `/api/agents/${agent}/details`, {
        target: '#agent-details-modal',
        swap: 'innerHTML'
    });
    document.getElementById('agent-details-modal').classList.remove('hidden');
}

// Initialize click handlers
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.agent-node').forEach(node => {
        node.addEventListener('click', function() {
            const agent = this.dataset.agent;
            showAgentDetails(agent);
        });
    });
});
</script>

<style>
.pulse-ring {
    animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
}

@keyframes pulse-ring {
    0% {
        transform: scale(0.8);
        opacity: 1;
    }
    100% {
        transform: scale(1.3);
        opacity: 0;
    }
}

.activity-dot {
    opacity: 0.7;
}

.agent-node:hover .agent-circle {
    filter: url(#glow) !important;
}

.agent-node:hover {
    transform: translate(200, 100) scale(1.05) !important;
}
</style>
