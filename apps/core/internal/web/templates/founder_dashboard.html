<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/sse.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .live-indicator {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        /* Energy sparkline bars */
        .sparkline-bar {
            display: inline-block;
            width: 8px;
            margin: 0 2px;
            border-radius: 2px;
            transition: height 0.3s ease;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-purple-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm border-b border-indigo-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <span class="text-2xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">
                            Saarathi
                        </span>
                        <span class="ml-2 text-xs text-gray-500">सारथी</span>
                    </div>
                    <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
                        <a href="/founder/dashboard" class="border-indigo-500 text-gray-900 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
                            Dashboard
                        </a>
                        <a href="/founder/reflection" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
                            Reflection
                        </a>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <!-- Live indicator -->
                    <div class="flex items-center space-x-2 text-sm text-gray-500">
                        <span class="relative flex h-3 w-3">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500 live-indicator"></span>
                        </span>
                        <span class="text-xs">Live</span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        <!-- Dashboard Summary - HTMX + SSE -->
        <div 
            id="dashboard-summary"
            hx-ext="sse"
            sse-connect="/founder/dashboard/stream"
            sse-swap="dashboard_update"
            hx-get="/founder/dashboard/summary"
            hx-trigger="load, every 30s"
            hx-swap="innerHTML"
        >
            <!-- Loading state -->
            <div class="flex items-center justify-center py-12">
                <i class="fas fa-circle-notch fa-spin text-4xl text-indigo-600"></i>
                <span class="ml-3 text-gray-600">Loading your patterns...</span>
            </div>
        </div>

        <!-- Reflection Form Section -->
        <div class="mt-8">
            <div class="bg-white rounded-2xl shadow-xl border border-indigo-100 overflow-hidden">
                <div class="px-6 py-4 bg-gradient-to-r from-indigo-600 to-purple-600">
                    <h2 class="text-xl font-bold text-white">
                        <i class="fas fa-clipboard-list mr-2"></i>
                        Weekly Reflection
                    </h2>
                </div>
                <div class="p-6">
                    <form 
                        hx-post="/founder/reflection"
                        hx-swap="innerHTML"
                        hx-target="#reflection-result"
                        class="space-y-6"
                    >
                        <!-- Energy Score -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                Energy Level This Week
                            </label>
                            <div class="flex items-center space-x-4">
                                <input 
                                    type="range" 
                                    name="energy_score" 
                                    min="1" 
                                    max="10" 
                                    value="7"
                                    class="flex-1 h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"
                                    id="energy-slider"
                                />
                                <span 
                                    id="energy-value" 
                                    class="text-2xl font-bold text-indigo-600 w-12 text-center"
                                >7</span>
                            </div>
                            <div class="flex justify-between text-xs text-gray-500 mt-1">
                                <span>Drained</span>
                                <span>Balanced</span>
                                <span>Energetic</span>
                            </div>
                        </div>

                        <!-- Shipped -->
                        <div>
                            <label for="shipped" class="block text-sm font-medium text-gray-700 mb-2">
                                <i class="fas fa-rocket text-green-500 mr-1"></i>
                                What did you ship?
                            </label>
                            <textarea 
                                id="shipped"
                                name="shipped" 
                                rows="3" 
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow shadow-sm"
                                placeholder="Features launched, code merged, decisions made..."
                            ></textarea>
                        </div>

                        <!-- Blocked -->
                        <div>
                            <label for="blocked" class="block text-sm font-medium text-gray-700 mb-2">
                                <i class="fas fa-exclamation-triangle text-yellow-500 mr-1"></i>
                                What's blocking you?
                            </label>
                            <textarea 
                                id="blocked"
                                name="blocked" 
                                rows="3" 
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow shadow-sm"
                                placeholder="Uncertainty, technical debt, lack of time..."
                            ></textarea>
                        </div>

                        <!-- Commitments -->
                        <div>
                            <label for="commitments" class="block text-sm font-medium text-gray-700 mb-2">
                                <i class="fas fa-check-circle text-blue-500 mr-1"></i>
                                Commitments for next week
                            </label>
                            <textarea 
                                id="commitments"
                                name="commitments" 
                                rows="4" 
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow shadow-sm"
                                placeholder="One commitment per line&#10;Ship user authentication&#10;Write landing page copy&#10;Talk to 3 potential users"
                            ></textarea>
                            <p class="text-xs text-gray-500 mt-1">
                                Each line becomes a tracked commitment
                            </p>
                        </div>

                        <!-- Submit Button -->
                        <div>
                            <button 
                                type="submit" 
                                class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-3 px-6 rounded-lg font-medium hover:from-indigo-700 hover:to-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all shadow-lg hover:shadow-xl"
                            >
                                <i class="fas fa-save mr-2"></i>
                                Save Reflection
                            </button>
                            <span class="htmx-indicator ml-3 text-indigo-600">
                                <i class="fas fa-circle-notch fa-spin"></i> Saving...
                            </span>
                        </div>

                        <!-- Result -->
                        <div id="reflection-result"></div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-12">
        <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
            <p class="text-center text-sm text-gray-500">
                Saarathi — Your AI Co-Founder. Not the warrior. Not the king. The trusted intelligence.
            </p>
        </div>
    </footer>

    <!-- Scripts -->
    <script>
        // Energy slider value display
        document.getElementById('energy-slider').addEventListener('input', function(e) {
            document.getElementById('energy-value').textContent = e.target.value;
        });

        // HTMX event handling
        document.body.addEventListener('htmx:afterSwap', function(event) {
            if (event.detail.target.id === 'reflection-result') {
                // Clear form on success
                if (event.detail.target.innerHTML.includes('✅')) {
                    event.detail.target.closest('form').reset();
                    document.getElementById('energy-value').textContent = '7';
                }
            }
        });
    </script>
</body>
</html>
