# ═══════════════════════════════════════════════════════════════
# SARTHI v1.0 — PRODUCTION DOCKER COMPOSE
# Temporal PostgreSQL backend + Langfuse observability
# ═══════════════════════════════════════════════════════════════

version: "3.8"

networks:
  sarthi-prod:
    driver: bridge
    name: sarthi-prod

volumes:
  langfuse_postgres_data:
  langfuse_clickhouse_data:

services:
  # ── Temporal (PostgreSQL backend) ──────────────────────────────
  temporal:
    image: temporalio/auto-setup:latest
    container_name: sarthi-temporal-prod
    restart: unless-stopped
    networks: [sarthi-prod]
    ports:
      - "7234:7233"
    environment:
      - DB=postgresql
      - DB_PORT=${TEMPORAL_DB_PORT:-5433}
      - POSTGRES_USER=${TEMPORAL_DB_USER:-sarthi}
      - POSTGRES_PWD=${TEMPORAL_DB_PASSWORD:-sarthi}
      - POSTGRES_SEEDS=${TEMPORAL_DB_HOST:-host.docker.internal}
      - DYNAMIC_CONFIG_FILE_PATH=/etc/temporal/config/dynamicconfig.yaml
      - LOG_LEVEL=warn
    volumes:
      - ./config/temporal/dynamicconfig.yaml:/etc/temporal/config/dynamicconfig.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7233/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  temporal-ui-prod:
    image: temporalio/ui:latest
    container_name: sarthi-temporal-ui-prod
    restart: unless-stopped
    networks: [sarthi-prod]
    ports:
      - "8089:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Langfuse (self-hosted LLM observability) ──────────────────
  langfuse:
    image: langfuse/langfuse:latest
    container_name: sarthi-langfuse
    restart: unless-stopped
    networks: [sarthi-prod]
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://sarthi:sarthi@host.docker.internal:5433/langfuse
      - NEXTAUTH_URL=http://localhost:3001
      - NEXTAUTH_SECRET=sarthi-langfuse-secret-change-in-prod
      - LANGFUSE_INIT_ORG_ID=sarthi
      - LANGFUSE_INIT_ORG_NAME=Sarthi
      - LANGFUSE_INIT_PROJECT_ID=sarthi-ai
      - LANGFUSE_INIT_PROJECT_NAME=sarthi-ai
      - LANGFUSE_INIT_PROJECT_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-pk-lf-local-dev}
      - LANGFUSE_INIT_PROJECT_SECRET_KEY=${LANGFUSE_SECRET_KEY:-sk-lf-local-dev}
      - LANGFUSE_INIT_USER_EMAIL=admin@sarthi.local
      - LANGFUSE_INIT_USER_NAME=admin
      - LANGFUSE_INIT_USER_PASSWORD=sarthi-admin-pass
      - TELEMETRY_ENABLED=false
    depends_on: []
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Sarthi Go API server ──────────────────────────────────────
  sarthi-api:
    build:
      context: apps/core
      dockerfile: Dockerfile
    container_name: sarthi-api
    restart: unless-stopped
    networks: [sarthi-prod]
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-sarthi}:${POSTGRES_PASSWORD:-sarthi}@host.docker.internal:${POSTGRES_PORT:-5433}/${POSTGRES_DB:-sarthi}
      - REDPANDA_BROKERS=host.docker.internal:19092
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_QUEUE=${TEMPORAL_QUEUE:-sarthi-queue}
      - LISTEN_ADDR=:8080
      - RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET:-}
      - TELEGRAM_API_BASE=${TELEGRAM_API_BASE:-http://host.docker.internal:8085}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-123:TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-42}
    depends_on:
      - temporal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Sarthi Python AI worker ───────────────────────────────────
  sarthi-worker:
    build:
      context: apps/ai
      dockerfile: Dockerfile
    container_name: sarthi-worker
    restart: unless-stopped
    networks: [sarthi-prod]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-sarthi}:${POSTGRES_PASSWORD:-sarthi}@host.docker.internal:${POSTGRES_PORT:-5433}/${POSTGRES_DB:-sarthi}
      - QDRANT_URL=http://host.docker.internal:6333
      - OLLAMA_BASE_URL=http://host.docker.internal:11434/v1
      - OLLAMA_CHAT_MODEL=${OLLAMA_CHAT_MODEL:-qwen3:0.6b}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text:latest}
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_QUEUE=${TEMPORAL_QUEUE:-sarthi-queue}
      - TELEGRAM_API_BASE=${TELEGRAM_API_BASE:-http://host.docker.internal:8085}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-123:TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-42}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://langfuse:3000}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-pk-lf-local-dev}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-sk-lf-local-dev}
      - LANGFUSE_ENABLED=${LANGFUSE_ENABLED:-true}
    depends_on:
      - temporal
      - langfuse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sarthi -d sarthi || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
